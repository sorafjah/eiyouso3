<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>栄養素ぶんるいゲーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --carb:#ffb35c; --carb-d:#e08a2e;
    --protein:#ff8792; --protein-d:#e25c68;
    --fat:#ffe066; --fat-d:#e0bf3a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none;}
  html,body{
    margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    font-family:'BIZ UDPGothic', 'Hiragino Maru Gothic ProN', sans-serif;
    background:#cdeefc; user-select:none; touch-action:none;
    -webkit-user-select:none;
  }
  #c{position:fixed; inset:0; display:block; touch-action:none;}

  /* ---------- HUD ---------- */
  #hud{
    position:fixed; top:0; left:0; right:0; z-index:20;
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 14px; gap:10px;
    background:rgba(255,255,255,0.88);
    border-bottom-left-radius:22px; border-bottom-right-radius:22px;
    box-shadow:0 4px 14px rgba(0,0,0,0.12);
    pointer-events:none;
  }
  #hud .left{display:flex; flex-direction:column; gap:2px;}
  #hud .title{font-weight:700; font-size:15px; color:#555;}
  #hud .hint{font-size:12px; color:#888;}
  #hud .mid{display:flex; align-items:center; gap:14px; font-weight:700;}
  #progress{font-size:20px; color:#444; background:#f0f0f0; padding:4px 12px; border-radius:14px;}
  #score{font-size:20px; color:#e08e00;}
  #muteBtn{
    pointer-events:auto; width:44px; height:44px; border-radius:50%; border:none;
    background:#f0f0f0; font-size:20px; display:flex; align-items:center; justify-content:center;
    box-shadow:0 2px 6px rgba(0,0,0,0.15);
  }
  #nextRow{
    position:fixed; top:78px; right:14px; z-index:20;
    display:flex; flex-direction:column; align-items:flex-end; gap:4px;
    pointer-events:none;
  }
  #nextRow .label{font-size:11px; color:#7a7a7a; background:rgba(255,255,255,0.8); padding:2px 8px; border-radius:10px;}
  #nextRow .icons{display:flex; gap:4px;}
  #nextRow .icons span{
    font-size:22px; background:rgba(255,255,255,0.85); border-radius:10px;
    width:34px; height:34px; display:flex; align-items:center; justify-content:center;
    box-shadow:0 2px 5px rgba(0,0,0,0.10);
  }

  /* ---------- Feedback popup ---------- */
  #feedback{
    position:fixed; top:38%; left:50%; z-index:30;
    transform:translate(-50%,-50%) scale(0.5);
    font-size:44px; font-weight:700; opacity:0;
    text-shadow:0 3px 0 rgba(255,255,255,0.9), 0 6px 14px rgba(0,0,0,0.2);
    pointer-events:none; white-space:nowrap;
  }
  #feedback.show{ animation:popFade 0.9s ease forwards; }
  @keyframes popFade{
    0%{ opacity:0; transform:translate(-50%,-50%) scale(0.4); }
    18%{ opacity:1; transform:translate(-50%,-50%) scale(1.15); }
    30%{ transform:translate(-50%,-50%) scale(1.0); }
    75%{ opacity:1; transform:translate(-50%,-55%) scale(1.0); }
    100%{ opacity:0; transform:translate(-50%,-70%) scale(0.95); }
  }

  /* ---------- Overlays ---------- */
  .overlay{
    position:fixed; inset:0; z-index:40;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:linear-gradient(180deg,#fff7e6,#ffe9d6);
    padding:22px; text-align:center;
  }
  .overlay h1{ font-size:clamp(24px,6vw,38px); color:#5b4636; margin:0 0 6px; }
  .overlay p.lead{ font-size:15px; color:#7a6a58; margin:0 0 18px; }
  .cardRow{ display:flex; gap:14px; flex-wrap:wrap; justify-content:center; margin-bottom:22px; max-width:640px;}
  .card{
    width:150px; padding:14px 10px; border-radius:18px; color:#fff;
    box-shadow:0 6px 14px rgba(0,0,0,0.15);
  }
  .card .icons{font-size:30px; margin-bottom:6px; letter-spacing:2px;}
  .card .name{font-weight:700; font-size:16px;}
  .card .desc{font-size:12px; opacity:0.95; margin-top:4px;}
  .bigBtn{
    pointer-events:auto; min-width:220px; min-height:60px; padding:14px 30px;
    font-size:22px; font-weight:700; color:#fff; border:none; border-radius:34px;
    background:linear-gradient(180deg,#6fcf6f,#43a843);
    box-shadow:0 6px 0 #2f7d2f, 0 10px 16px rgba(0,0,0,0.2);
    cursor:pointer;
  }
  .bigBtn:active{ transform:translateY(4px); box-shadow:0 2px 0 #2f7d2f, 0 6px 10px rgba(0,0,0,0.2); }

  #endScreen{ display:none; }
  #endScreen .resultBox{
    background:#fff; border-radius:24px; padding:26px 34px; box-shadow:0 8px 20px rgba(0,0,0,0.15);
    margin-bottom:22px;
  }
  #endScreen .resultBox .line{ font-size:19px; color:#555; margin:6px 0; }
  #endScreen .resultBox .big{ font-size:34px; font-weight:700; color:#e08e00; }

  #itemNameTag{
    position:fixed; left:0; top:0; z-index:15;
    transform:translate(-50%,-50%);
    background:rgba(255,255,255,0.95);
    border:2px solid #d8cdb8;
    border-radius:20px;
    padding:5px 16px;
    font-weight:700; font-size:17px; color:#4a3b2c;
    white-space:nowrap;
    pointer-events:none;
    box-shadow:0 3px 8px rgba(0,0,0,0.12);
    display:none;
  }
  #startScreen{ z-index:50; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="hud">
  <div class="left">
    <div class="title">🍽️ 栄養素ぶんるいゲーム</div>
    <div class="hint">ゆびで食べ物をドラッグして、はこに入れよう</div>
  </div>
  <div class="mid">
    <div id="progress">0 / 15</div>
    <div id="score">★ 0</div>
  </div>
  <button id="muteBtn">🔊</button>
</div>

<div id="nextRow">
  <div class="label">つぎ</div>
  <div class="icons" id="nextIcons"></div>
</div>

<div id="feedback"></div>
<div id="itemNameTag"></div>

<div id="startScreen" class="overlay">
  <h1>栄養素ぶんるいゲーム</h1>
  <p class="lead">食べ物を、正しい なかまの はこに いれよう！</p>
  <div class="cardRow">
    <div class="card" style="background:linear-gradient(160deg,var(--carb),var(--carb-d));">
      <div class="icons">🍚🍞🥔</div>
      <div class="name">炭水化物</div>
      <div class="desc">エネルギーのもと</div>
    </div>
    <div class="card" style="background:linear-gradient(160deg,var(--protein),var(--protein-d));">
      <div class="icons">🥩🐟🥚</div>
      <div class="name">たんぱく質</div>
      <div class="desc">からだをつくる</div>
    </div>
    <div class="card" style="background:linear-gradient(160deg,var(--fat),var(--fat-d));">
      <div class="icons">🧈🥑🧀</div>
      <div class="name">脂質</div>
      <div class="desc">エネルギーをたくわえる</div>
    </div>
  </div>
  <button class="bigBtn" id="startBtn">▶ はじめる</button>
</div>

<div id="endScreen" class="overlay">
  <h1>🎉 クリア！</h1>
  <div class="resultBox">
    <div class="line">せいかい <span class="big" id="finalScore">0</span> / 15</div>
    <div class="line">まちがえた回数：<span id="finalMistakes">0</span></div>
  </div>
  <button class="bigBtn" id="restartBtn">🔄 もういちど</button>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

/* ============================================================
   データ定義
============================================================ */
const ITEMS = [
  {name:'ごはん',        emoji:'🍚', cat:'carb'},
  {name:'パン',          emoji:'🍞', cat:'carb'},
  {name:'うどん',        emoji:'🍜', cat:'carb'},
  {name:'じゃがいも',    emoji:'🥔', cat:'carb'},
  {name:'とうもろこし',  emoji:'🌽', cat:'carb'},
  {name:'にく',          emoji:'🥩', cat:'protein'},
  {name:'さかな',        emoji:'🐟', cat:'protein'},
  {name:'たまご',        emoji:'🥚', cat:'protein'},
  {name:'ぎゅうにゅう',  emoji:'🥛', cat:'protein'},
  {name:'だいず',        emoji:'🫘', cat:'protein'},
  {name:'バター',        emoji:'🧈', cat:'fat'},
  {name:'オリーブオイル',emoji:'🫒', cat:'fat'},
  {name:'アボカド',      emoji:'🥑', cat:'fat'},
  {name:'ナッツ',        emoji:'🥜', cat:'fat'},
  {name:'チーズ',        emoji:'🧀', cat:'fat'},
];

const CATS = {
  carb:    {label:'炭水化物',   sub:'エネルギーのもと',       color:0xffb35c, dark:0xe08a2e, css:'#ffb35c', pos:new THREE.Vector3(-4.1,0,-3.4)},
  protein: {label:'たんぱく質', sub:'からだをつくる',         color:0xff8792, dark:0xe25c68, css:'#ff8792', pos:new THREE.Vector3( 0.0,0,-3.4)},
  fat:     {label:'脂質',       sub:'エネルギーをたくわえる', color:0xffe066, dark:0xe0bf3a, css:'#ffe066', pos:new THREE.Vector3( 4.1,0,-3.4)},
};

const SPAWN_POS = new THREE.Vector3(0, 1.0, 3.0);
const DRAG_BOUNDS = {xMin:-6.4, xMax:6.4, zMin:-4.3, zMax:4.3};
const ZONE = {halfX:1.9, halfZ:2.3};

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

/* ============================================================
   THREE セットアップ
============================================================ */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xcdeefc);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 9.2, 8.6);
camera.lookAt(0, 0, -1.6);

function onResize(){
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
window.addEventListener('resize', onResize);
onResize();

// ライト
scene.add(new THREE.HemisphereLight(0xffffff, 0x7a8b93, 1.25));
const dirLight = new THREE.DirectionalLight(0xfff8e6, 1.05);
dirLight.position.set(5, 10, 6);
scene.add(dirLight);
scene.add(new THREE.AmbientLight(0xffffff, 0.35));

// 背景の壁
const backWall = new THREE.Mesh(
  new THREE.PlaneGeometry(26, 10),
  new THREE.MeshStandardMaterial({color:0xf6fbff, roughness:1})
);
backWall.position.set(0, 4.2, -6.2);
scene.add(backWall);

// 床(テーブル)
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(24, 20),
  new THREE.MeshStandardMaterial({color:0xfff7e8, roughness:0.95})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

/* ============================================================
   ラベル・テクスチャ生成
============================================================ */
function makeEmojiTexture(emoji){
  const size = 256;
  const cv = document.createElement('canvas');
  cv.width = size; cv.height = size;
  const ctx = cv.getContext('2d');
  ctx.clearRect(0,0,size,size);
  ctx.font = `${size*0.72}px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(emoji, size/2, size/2 + size*0.06);
  const tex = new THREE.CanvasTexture(cv);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

function makeShadowTexture(){
  const size = 128;
  const cv = document.createElement('canvas');
  cv.width = size; cv.height = size;
  const ctx = cv.getContext('2d');
  const g = ctx.createRadialGradient(size/2,size/2,4, size/2,size/2,size/2);
  g.addColorStop(0, 'rgba(0,0,0,0.38)');
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,size,size);
  return new THREE.CanvasTexture(cv);
}
const shadowTex = makeShadowTexture();

function makeLabelSprite(cat){
  const w = 340, h = 150;
  const cv = document.createElement('canvas');
  cv.width = w; cv.height = h;
  const ctx = cv.getContext('2d');
  const r = 28;
  ctx.beginPath();
  ctx.moveTo(r,0);
  ctx.arcTo(w,0,w,h,r);
  ctx.arcTo(w,h,0,h,r);
  ctx.arcTo(0,h,0,0,r);
  ctx.arcTo(0,0,w,0,r);
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.fill();
  ctx.lineWidth = 6;
  ctx.strokeStyle = cat.css;
  ctx.stroke();

  ctx.fillStyle = '#4a3b2c';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = '700 52px "BIZ UDPGothic", sans-serif';
  ctx.fillText(cat.label, w/2, 58);
  ctx.font = '400 28px "BIZ UDPGothic", sans-serif';
  ctx.fillStyle = '#7a6a58';
  ctx.fillText(cat.sub, w/2, 108);

  const tex = new THREE.CanvasTexture(cv);
  tex.colorSpace = THREE.SRGBColorSpace;
  const mat = new THREE.SpriteMaterial({map:tex, transparent:true, depthWrite:false});
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(3.4, 1.5, 1);
  return sprite;
}

/* ============================================================
   はこ (トレイ) の生成
============================================================ */
function createBox(key){
  const cat = CATS[key];
  const group = new THREE.Group();

  const W = 2.7, D = 2.05, H = 0.7, T = 0.2; // 幅・奥行き・高さ(合計は従来と同じ)・壁の厚み

  const wallMat  = new THREE.MeshStandardMaterial({color:cat.color, roughness:0.55});
  const floorMat = new THREE.MeshStandardMaterial({
    color:cat.dark, roughness:0.9,
    emissive:new THREE.Color(cat.dark), emissiveIntensity:0.18
  });

  // 底
  const floor = new THREE.Mesh(new THREE.BoxGeometry(W - T*1.4, 0.08, D - T*1.4), floorMat);
  floor.position.y = 0.04;
  group.add(floor);

  // 側面の壁 (前後左右) — はっきり「箱」に見えるように立ち上げる
  const front = new THREE.Mesh(new THREE.BoxGeometry(W, H, T), wallMat);
  front.position.set(0, H/2, D/2 - T/2);
  group.add(front);

  const back = new THREE.Mesh(new THREE.BoxGeometry(W, H, T), wallMat);
  back.position.set(0, H/2, -D/2 + T/2);
  group.add(back);

  const left = new THREE.Mesh(new THREE.BoxGeometry(T, H, D), wallMat);
  left.position.set(-W/2 + T/2, H/2, 0);
  group.add(left);

  const right = new THREE.Mesh(new THREE.BoxGeometry(T, H, D), wallMat);
  right.position.set(W/2 - T/2, H/2, 0);
  group.add(right);

  const label = makeLabelSprite(cat);
  label.position.set(0, 2.15, 0);
  group.add(label);

  group.position.copy(cat.pos);
  scene.add(group);
  return group;
}
Object.keys(CATS).forEach(createBox);

function findBoxAt(x, z){
  for(const key in CATS){
    const p = CATS[key].pos;
    if(Math.abs(x-p.x) < ZONE.halfX && Math.abs(z-p.z) < ZONE.halfZ) return key;
  }
  return null;
}

/* ============================================================
   アイテム (食べ物) 管理
============================================================ */
let currentItem = null;   // {group, data, phase, tween, dragging, shakeStart}
let itemShadowMesh = null;

function createItemShadow(){
  const mat = new THREE.SpriteMaterial({map:shadowTex, transparent:true, depthWrite:false});
  const s = new THREE.Sprite(mat);
  s.scale.set(1.5, 0.55, 1);
  s.position.y = 0.02;
  scene.add(s);
  return s;
}
itemShadowMesh = createItemShadow();

function spawnItem(data){
  const group = new THREE.Group();
  const tex = makeEmojiTexture(data.emoji);
  const mat = new THREE.SpriteMaterial({map:tex, transparent:true});
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(1.9, 1.9, 1);
  group.add(sprite);

  group.position.copy(SPAWN_POS);
  scene.add(group);

  itemNameTagEl.textContent = data.name;
  itemNameTagEl.style.display = 'block';

  currentItem = {
    group, data, phase:'idle', tween:null, dragging:false, shakeStart:0
  };
  updateNextRow();
}

/* ============================================================
   パーティクル演出
============================================================ */
const particles = [];
function spawnParticles(pos, colorCss){
  for(let i=0;i<12;i++){
    const geo = new THREE.SphereGeometry(0.09, 6, 6);
    const mat = new THREE.MeshBasicMaterial({color:colorCss, transparent:true});
    const m = new THREE.Mesh(geo, mat);
    m.position.set(pos.x, 1.0, pos.z);
    const angle = Math.random()*Math.PI*2;
    const speed = 1.5 + Math.random()*1.8;
    m.userData.vel = new THREE.Vector3(Math.cos(angle)*speed, 3 + Math.random()*2, Math.sin(angle)*speed);
    m.userData.age = 0;
    m.userData.life = 550 + Math.random()*250;
    scene.add(m);
    particles.push(m);
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.userData.age += dt*1000;
    const v = p.userData.vel;
    v.y -= 9.0*dt;
    p.position.x += v.x*dt;
    p.position.y += v.y*dt;
    p.position.z += v.z*dt;
    const t = p.userData.age / p.userData.life;
    p.material.opacity = Math.max(0, 1-t);
    p.scale.setScalar(Math.max(0.001, 1-t*0.5));
    if(t >= 1){ scene.remove(p); p.geometry.dispose(); p.material.dispose(); particles.splice(i,1); }
  }
}

/* ============================================================
   オーディオ (Web Audio API)
============================================================ */
let actx = null;
let muted = false;
function ensureAudio(){
  if(!actx){
    actx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if(actx.state === 'suspended') actx.resume();
}
function beep(freq, duration, type='sine', delay=0, gainVal=0.18){
  if(muted || !actx) return;
  const t0 = actx.currentTime + delay;
  const osc = actx.createOscillator();
  const gain = actx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.0001, t0);
  gain.gain.linearRampToValueAtTime(gainVal, t0+0.02);
  gain.gain.exponentialRampToValueAtTime(0.001, t0+duration);
  osc.connect(gain).connect(actx.destination);
  osc.start(t0);
  osc.stop(t0+duration+0.05);
}
function playPickup(){ beep(440, 0.06, 'sine', 0, 0.09); }
function playCorrect(){ beep(523.25,0.13,'sine',0); beep(659.25,0.13,'sine',0.11); beep(783.99,0.2,'sine',0.22); }
function playWrong(){ beep(170,0.28,'sawtooth',0,0.13); }
function playClear(){
  [523.25,659.25,783.99,1046.5].forEach((f,i)=>beep(f,0.22,'sine',i*0.13,0.15));
}

/* ============================================================
   入力処理 (ポインター/タッチ ドラッグ)
============================================================ */
const raycaster = new THREE.Raycaster();
const pointerNDC = new THREE.Vector2();
const dragPlane = new THREE.Plane(new THREE.Vector3(0,1,0), -1.35);

function setNDC(e){
  const rect = canvas.getBoundingClientRect();
  pointerNDC.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  pointerNDC.y = -(((e.clientY - rect.top) / rect.height) * 2 - 1);
}
function raycastToDragPlane(){
  raycaster.setFromCamera(pointerNDC, camera);
  const pt = new THREE.Vector3();
  const hit = raycaster.ray.intersectPlane(dragPlane, pt);
  return hit ? pt : null;
}

canvas.addEventListener('pointerdown', (e)=>{
  if(!gameActive || !currentItem || currentItem.phase !== 'idle') return;
  setNDC(e);
  raycaster.setFromCamera(pointerNDC, camera);
  const hits = raycaster.intersectObject(currentItem.group.children[0]);
  if(hits.length === 0) return;
  canvas.setPointerCapture(e.pointerId);
  currentItem.dragging = true;
  currentItem.group.position.y = 1.35;
  currentItem.group.scale.setScalar(1.08);
  playPickup();
});
canvas.addEventListener('pointermove', (e)=>{
  if(!currentItem || !currentItem.dragging) return;
  setNDC(e);
  const pt = raycastToDragPlane();
  if(!pt) return;
  currentItem.group.position.x = THREE.MathUtils.clamp(pt.x, DRAG_BOUNDS.xMin, DRAG_BOUNDS.xMax);
  currentItem.group.position.z = THREE.MathUtils.clamp(pt.z, DRAG_BOUNDS.zMin, DRAG_BOUNDS.zMax);

  // 箱の上に浮かせたら、指を離さなくてもその場で判定する(ゆるい当たり判定)
  const key = findBoxAt(currentItem.group.position.x, currentItem.group.position.z);
  if(key){
    currentItem.dragging = false;
    currentItem.group.scale.setScalar(1.0);
    try{ canvas.releasePointerCapture(e.pointerId); }catch(err){}
    if(key === currentItem.data.cat){
      correctDrop(key);
    } else {
      wrongDrop();
    }
  }
});
function endDrag(e){
  if(!currentItem || !currentItem.dragging) return;
  currentItem.dragging = false;
  currentItem.group.scale.setScalar(1.0);
  handleDrop();
}
canvas.addEventListener('pointerup', endDrag);
canvas.addEventListener('pointercancel', endDrag);
canvas.addEventListener('contextmenu', (e)=>e.preventDefault());

/* ============================================================
   ゲームロジック
============================================================ */
let queue = [];
let index = 0;
let score = 0;
let mistakes = 0;
let gameActive = false;

const progressEl = document.getElementById('progress');
const scoreEl = document.getElementById('score');
const feedbackEl = document.getElementById('feedback');
const itemNameTagEl = document.getElementById('itemNameTag');
const nextIconsEl = document.getElementById('nextIcons');
const startScreen = document.getElementById('startScreen');
const endScreen = document.getElementById('endScreen');

function updateHUD(){
  progressEl.textContent = `${index} / ${queue.length}`;
  scoreEl.textContent = `★ ${score}`;
}
function updateNextRow(){
  const upcoming = queue.slice(index+1, index+5);
  nextIconsEl.innerHTML = upcoming.map(d=>`<span>${d.emoji}</span>`).join('');
}
function showFeedback(text, color){
  feedbackEl.textContent = text;
  feedbackEl.style.color = color;
  feedbackEl.classList.remove('show');
  void feedbackEl.offsetWidth;
  feedbackEl.classList.add('show');
}

function handleDrop(){
  if(!currentItem) return;
  const {x, z} = currentItem.group.position;
  const key = findBoxAt(x, z);
  if(key === currentItem.data.cat){
    correctDrop(key);
  } else if(key){
    wrongDrop();
  } else {
    currentItem.phase = 'return';
    currentItem.tween = {
      start: performance.now(), duration: 350,
      from: currentItem.group.position.clone(), to: SPAWN_POS.clone()
    };
  }
}

function correctDrop(key){
  playCorrect();
  showFeedback('せいかい！', '#3fa33f');
  itemNameTagEl.style.display = 'none';
  spawnParticles(CATS[key].pos, CATS[key].css);
  score++; index++;
  updateHUD();

  const target = CATS[key].pos.clone();
  target.y = 1.0;
  currentItem.phase = 'consume';
  currentItem.tween = {
    start: performance.now(), duration: 360,
    from: currentItem.group.position.clone(), to: target, scaleTo: 0.05
  };

  const finishedItem = currentItem;
  setTimeout(()=>{
    scene.remove(finishedItem.group);
    finishedItem.group.children.forEach(c=>{ if(c.material?.map) c.material.map.dispose(); c.material?.dispose(); });
    currentItem = null;
    if(index >= queue.length){
      endGame();
    } else {
      spawnItem(queue[index]);
    }
  }, 380);
}

function wrongDrop(){
  playWrong();
  mistakes++;
  showFeedback('ちがうよ、もう一回！', '#e05a4e');
  currentItem.phase = 'shake';
  currentItem.shakeStart = performance.now();
}

function startGame(){
  ensureAudio();
  queue = shuffle(ITEMS);
  index = 0; score = 0; mistakes = 0;
  gameActive = true;
  startScreen.style.display = 'none';
  endScreen.style.display = 'none';
  updateHUD();
  spawnItem(queue[0]);
}

function endGame(){
  gameActive = false;
  updateNextRow();
  playClear();
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalMistakes').textContent = mistakes;
  endScreen.style.display = 'flex';
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);
document.getElementById('muteBtn').addEventListener('click', (e)=>{
  muted = !muted;
  e.currentTarget.textContent = muted ? '🔇' : '🔊';
});

/* ============================================================
   メインループ
============================================================ */
function easeOutCubic(t){ return 1 - Math.pow(1-t, 3); }

let lastTime = performance.now();
function animate(now){
  requestAnimationFrame(animate);
  const dt = Math.min((now - lastTime) / 1000, 1/30);
  lastTime = now;

  if(currentItem){
    const g = currentItem.group;

    if(currentItem.phase === 'idle' && !currentItem.dragging){
      g.position.y = 1.0 + Math.sin(now*0.0025)*0.12;
      g.rotation.y += dt*0.6;
      const pulse = 1 + Math.sin(now*0.003)*0.04;
      g.scale.setScalar(pulse);
    }

    if(currentItem.phase === 'shake'){
      const elapsed = now - currentItem.shakeStart;
      g.rotation.z = Math.sin(elapsed*0.06) * 0.35;
      if(elapsed > 420){
        g.rotation.z = 0;
        currentItem.phase = 'return';
        currentItem.tween = {
          start: now, duration: 380,
          from: g.position.clone(), to: SPAWN_POS.clone()
        };
      }
    }

    if(currentItem.tween){
      const tw = currentItem.tween;
      const t = Math.min(1, (now - tw.start) / tw.duration);
      const ease = easeOutCubic(t);
      g.position.lerpVectors(tw.from, tw.to, ease);
      if(tw.scaleTo !== undefined){
        g.scale.setScalar(THREE.MathUtils.lerp(1, tw.scaleTo, ease));
      }
      if(t >= 1){
        if(currentItem.phase === 'return'){
          currentItem.phase = 'idle';
          g.position.copy(SPAWN_POS);
          g.rotation.z = 0;
        }
        currentItem.tween = null;
      }
    }

    itemShadowMesh.visible = true;
    itemShadowMesh.position.set(g.position.x, 0.02, g.position.z);
    const heightFactor = THREE.MathUtils.clamp(1 - (g.position.y - 1.0)/2.5, 0.5, 1);
    itemShadowMesh.scale.set(1.5*heightFactor, 0.55*heightFactor, 1);

    // 名前タグ(HTML)を、食べ物の手前・少し下の位置に追従させる
    const tagWorld = new THREE.Vector3(g.position.x, 0.25, g.position.z + 0.55);
    tagWorld.project(camera);
    const sx = (tagWorld.x * 0.5 + 0.5) * window.innerWidth;
    const sy = (-tagWorld.y * 0.5 + 0.5) * window.innerHeight;
    itemNameTagEl.style.left = sx + 'px';
    itemNameTagEl.style.top = sy + 'px';
  } else {
    itemShadowMesh.visible = false;
    itemNameTagEl.style.display = 'none';
  }

  updateParticles(dt);
  renderer.render(scene, camera);
}
requestAnimationFrame(animate);

/* ============================================================
   テストフック
============================================================ */
window.__game = {
  getState(){
    return {
      index, score, mistakes,
      total: queue.length,
      currentItem: currentItem ? {name:currentItem.data.name, cat:currentItem.data.cat} : null,
      gameActive
    };
  },
  dropAt(catKey){
    if(!currentItem) return false;
    const p = CATS[catKey].pos;
    currentItem.group.position.set(p.x, 1.0, p.z);
    handleDrop();
    return true;
  },
  restart(){ startGame(); }
};
</script>
